<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" fill="none">
  <rect width="300" height="400" rx="16" fill="#FFF9E6"/>
  <!-- Background decorations -->
  <circle cx="50" cy="50" r="30" fill="#FFE0B2" opacity="0.6"/>
  <circle cx="260" cy="80" r="20" fill="#FFCC80" opacity="0.5"/>
  <circle cx="40" cy="360" r="25" fill="#FFE0B2" opacity="0.5"/>
  <circle cx="270" cy="330" r="18" fill="#FFCC80" opacity="0.4"/>
  <!-- Stars -->
  <text x="80" y="40" font-size="14" fill="#FFB74D">✦</text>
  <text x="230" y="55" font-size="12" fill="#FFB74D">✦</text>
  <text x="60" y="370" font-size="10" fill="#FFB74D">✦</text>
  <!-- Heart center -->
  <text x="150" y="180" font-size="48" text-anchor="middle" fill="#FF7043">💕</text>
  <!-- Bride icon -->
  <text x="100" y="180" font-size="36" text-anchor="middle" fill="#EF5350">👰</text>
  <!-- Groom icon -->
  <text x="200" y="180" font-size="36" text-anchor="middle" fill="#42A5F5">🤵</text>
  <!-- Ribbon bottom -->
  <rect x="60" y="280" width="180" height="4" rx="2" fill="#FFB74D" opacity="0.6"/>
  <rect x="60" y="290" width="180" height="4" rx="2" fill="#FF8A65" opacity="0.6"/>
  <!-- Text -->
  <text x="150" y="320" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#5D4037">Cartoon</text>
  <text x="150" y="342" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#5D4037">Whimsical</text>
  <!-- Badge -->
  <rect x="90" y="355" width="120" height="22" rx="11" fill="#FFB74D"/>
  <text x="150" y="371" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#5D4037">✨ Animasi GSAP</text>
</svg>
