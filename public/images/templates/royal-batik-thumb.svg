<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533">
  <!-- Background warm cream -->
  <rect width="400" height="533" fill="#FEF3C7"/>

  <!-- Batik-inspired wavy ornament top -->
  <path d="M0 30 Q50 5 100 30 Q150 55 200 30 Q250 5 300 30 Q350 55 400 30" stroke="#7C3D12" stroke-width="2" fill="none" opacity="0.25"/>
  <path d="M0 45 Q50 20 100 45 Q150 70 200 45 Q250 20 300 45 Q350 70 400 45" stroke="#7C3D12" stroke-width="1.5" fill="none" opacity="0.18"/>
  <!-- Dots on wave -->
  <circle cx="100" cy="30" r="4" fill="#7C3D12" opacity="0.3"/>
  <circle cx="200" cy="30" r="4" fill="#7C3D12" opacity="0.3"/>
  <circle cx="300" cy="30" r="4" fill="#7C3D12" opacity="0.3"/>

  <!-- Batik-inspired wavy ornament bottom (flipped) -->
  <path d="M0 503 Q50 528 100 503 Q150 478 200 503 Q250 528 300 503 Q350 478 400 503" stroke="#7C3D12" stroke-width="2" fill="none" opacity="0.25"/>
  <path d="M0 518 Q50 543 100 518 Q150 493 200 518 Q250 543 300 518 Q350 493 400 518" stroke="#7C3D12" stroke-width="1.5" fill="none" opacity="0.18"/>
  <circle cx="100" cy="503" r="4" fill="#7C3D12" opacity="0.3"/>
  <circle cx="200" cy="503" r="4" fill="#7C3D12" opacity="0.3"/>
  <circle cx="300" cy="503" r="4" fill="#7C3D12" opacity="0.3"/>

  <!-- Diamond ornamental divider top -->
  <line x1="130" y1="85" x2="183" y2="85" stroke="#7C3D12" stroke-width="1" opacity="0.35"/>
  <rect x="196" y="81" width="8" height="8" fill="#7C3D12" opacity="0.4" transform="rotate(45 200 85)"/>
  <line x1="217" y1="85" x2="270" y2="85" stroke="#7C3D12" stroke-width="1" opacity="0.35"/>

  <!-- Photo placeholder circle with batik border -->
  <circle cx="200" cy="175" r="72" fill="none" stroke="#7C3D12" stroke-width="3.5"/>
  <circle cx="200" cy="175" r="65" fill="#FDEDB0"/>
  <text x="200" y="188" text-anchor="middle" font-size="44" fill="#7C3D12">💍</text>

  <!-- Bismillah label -->
  <text x="200" y="76" text-anchor="middle" font-family="serif" font-size="10" fill="#7C3D12" letter-spacing="2" opacity="0.7">Bismillahirrahmanirrahim</text>

  <!-- Groom name -->
  <text x="200" y="302" text-anchor="middle" font-family="serif" font-size="34" font-weight="bold" fill="#7C3D12">Rizky</text>

  <!-- Diamond divider middle -->
  <line x1="152" y1="322" x2="186" y2="322" stroke="#7C3D12" stroke-width="1" opacity="0.3"/>
  <rect x="197" y="318" width="6" height="6" fill="#7C3D12" opacity="0.35" transform="rotate(45 200 321)"/>
  <line x1="214" y1="322" x2="248" y2="322" stroke="#7C3D12" stroke-width="1" opacity="0.3"/>

  <!-- Bride name -->
  <text x="200" y="360" text-anchor="middle" font-family="serif" font-size="34" font-weight="bold" fill="#7C3D12">Aulia</text>

  <!-- Date -->
  <text x="200" y="396" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400E" opacity="0.8">20 September 2025</text>

  <!-- Diamond divider bottom -->
  <line x1="130" y1="415" x2="183" y2="415" stroke="#7C3D12" stroke-width="1" opacity="0.35"/>
  <rect x="196" y="411" width="8" height="8" fill="#7C3D12" opacity="0.4" transform="rotate(45 200 415)"/>
  <line x1="217" y1="415" x2="270" y2="415" stroke="#7C3D12" stroke-width="1" opacity="0.35"/>

  <!-- Template name tag -->
  <rect x="120" y="440" width="160" height="28" rx="14" fill="#7C3D12" opacity="0.12"/>
  <text x="200" y="459" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7C3D12" font-weight="600">Royal Batik</text>

  <!-- Tags -->
  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#92400E" opacity="0.65">Tradisional · Batik · Indonesia</text>
</svg>
