<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533">
  <!-- Background white -->
  <rect width="400" height="533" fill="#FFFFFF"/>

  <!-- Accent top bar -->
  <rect x="0" y="0" width="400" height="4" fill="#1C1917"/>

  <!-- Photo placeholder rectangle (full-bleed style) -->
  <rect x="0" y="4" width="400" height="240" fill="#F5F5F4"/>
  <!-- Gradient overlay hint -->
  <rect x="0" y="180" width="400" height="64" fill="url(#grad1)"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Photo icon centered -->
  <text x="200" y="130" text-anchor="middle" font-size="48" fill="#D6D3D1">🖼</text>
  <text x="200" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#A8A29E">Foto couple</text>

  <!-- "We're Getting Married" label -->
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#78716C" letter-spacing="5">WE'RE GETTING MARRIED</text>

  <!-- Divider lines around ampersand -->
  <line x1="100" y1="322" x2="168" y2="322" stroke="#1C1917" stroke-width="0.8" opacity="0.2"/>
  <text x="200" y="326" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#78716C">&amp;</text>
  <line x1="232" y1="322" x2="300" y2="322" stroke="#1C1917" stroke-width="0.8" opacity="0.2"/>

  <!-- Groom name -->
  <text x="200" y="318" text-anchor="middle" font-family="serif" font-size="40" font-weight="bold" fill="#1C1917">Rizky</text>
  <!-- Bride name -->
  <text x="200" y="365" text-anchor="middle" font-family="serif" font-size="40" font-weight="bold" fill="#1C1917">Aulia</text>

  <!-- Date -->
  <text x="200" y="400" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#78716C">20 September 2025</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="529" width="400" height="4" fill="#1C1917"/>

  <!-- Template name tag -->
  <rect x="120" y="430" width="160" height="28" rx="14" fill="#1C1917" opacity="0.08"/>
  <text x="200" y="449" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1C1917" font-weight="600">Modern Serif</text>

  <!-- Tags -->
  <text x="200" y="485" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#78716C" opacity="0.7">Modern · Minimalis · Editorial</text>
</svg>
