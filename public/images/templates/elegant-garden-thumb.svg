<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533">
  <!-- Background warm cream -->
  <rect width="400" height="533" fill="#F5ECD7"/>

  <!-- Decorative circle ornaments -->
  <circle cx="-20" cy="-20" r="110" fill="#B5936E" opacity="0.10"/>
  <circle cx="430" cy="560" r="140" fill="#B5936E" opacity="0.10"/>
  <circle cx="380" cy="30" r="60" fill="#B5936E" opacity="0.06"/>

  <!-- Thin top border line -->
  <rect x="40" y="18" width="320" height="1" fill="#B5936E" opacity="0.4"/>
  <rect x="40" y="22" width="320" height="0.5" fill="#B5936E" opacity="0.25"/>

  <!-- "The Wedding of" label -->
  <text x="200" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#B5936E" letter-spacing="4" opacity="0.85">THE WEDDING OF</text>

  <!-- Ornament divider -->
  <line x1="120" y1="73" x2="176" y2="73" stroke="#B5936E" stroke-width="0.8" opacity="0.4"/>
  <circle cx="200" cy="73" r="2.5" fill="#B5936E" opacity="0.5"/>
  <line x1="224" y1="73" x2="280" y2="73" stroke="#B5936E" stroke-width="0.8" opacity="0.4"/>

  <!-- Photo circle placeholder with floral ring -->
  <circle cx="200" cy="165" r="75" fill="none" stroke="#B5936E" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="165" r="70" fill="#EDD9B8" opacity="0.6"/>
  <!-- Floral accents around circle -->
  <circle cx="200" cy="90" r="5" fill="#B5936E" opacity="0.3"/>
  <circle cx="275" cy="115" r="4" fill="#B5936E" opacity="0.25"/>
  <circle cx="275" cy="215" r="4" fill="#B5936E" opacity="0.25"/>
  <circle cx="200" cy="240" r="5" fill="#B5936E" opacity="0.3"/>
  <circle cx="125" cy="215" r="4" fill="#B5936E" opacity="0.25"/>
  <circle cx="125" cy="115" r="4" fill="#B5936E" opacity="0.25"/>
  <!-- Silhouette inside circle -->
  <ellipse cx="190" cy="155" rx="18" ry="22" fill="#C8A882" opacity="0.5"/>
  <circle cx="190" cy="138" r="11" fill="#C8A882" opacity="0.5"/>
  <ellipse cx="210" cy="158" rx="18" ry="22" fill="#B5936E" opacity="0.45"/>
  <circle cx="210" cy="140" r="11" fill="#B5936E" opacity="0.45"/>

  <!-- Groom Name -->
  <text x="200" y="268" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#8B6640">Rizky</text>
  <!-- Ampersand ornament -->
  <text x="200" y="296" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#B5936E" opacity="0.7">&amp;</text>
  <!-- Bride Name -->
  <text x="200" y="326" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#8B6640">Aulia</text>

  <!-- Divider line with diamond -->
  <line x1="80" y1="344" x2="180" y2="344" stroke="#B5936E" stroke-width="0.8" opacity="0.4"/>
  <rect x="197" y="340" width="6" height="6" fill="#B5936E" opacity="0.5" transform="rotate(45 200 343)"/>
  <line x1="220" y1="344" x2="320" y2="344" stroke="#B5936E" stroke-width="0.8" opacity="0.4"/>

  <!-- Date -->
  <text x="200" y="368" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B6640" letter-spacing="2" opacity="0.9">SABTU, 20 SEPTEMBER 2026</text>

  <!-- Venue section -->
  <text x="200" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" fill="#B5936E" letter-spacing="2" opacity="0.7">RESEPSI PERNIKAHAN</text>
  <text x="200" y="413" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#5C3D1E" opacity="0.85">Gedung Serbaguna</text>
  <text x="200" y="428" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8B6640" opacity="0.65">Jl. Raya No. 1, Jakarta</text>

  <!-- Floral bottom ornament -->
  <ellipse cx="100" cy="478" rx="30" ry="15" fill="#B5936E" opacity="0.08" transform="rotate(-20 100 478)"/>
  <ellipse cx="130" cy="490" rx="20" ry="10" fill="#B5936E" opacity="0.07" transform="rotate(-10 130 490)"/>
  <ellipse cx="300" cy="478" rx="30" ry="15" fill="#B5936E" opacity="0.08" transform="rotate(20 300 478)"/>
  <ellipse cx="270" cy="490" rx="20" ry="10" fill="#B5936E" opacity="0.07" transform="rotate(10 270 490)"/>

  <!-- RSVP section -->
  <rect x="120" y="450" width="160" height="32" rx="16" fill="none" stroke="#B5936E" stroke-width="1" opacity="0.5"/>
  <text x="200" y="471" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#8B6640" letter-spacing="1.5" opacity="0.8">KONFIRMASI KEHADIRAN</text>

  <!-- Bottom border -->
  <rect x="40" y="509" width="320" height="0.5" fill="#B5936E" opacity="0.25"/>
  <rect x="40" y="512" width="320" height="1" fill="#B5936E" opacity="0.4"/>
</svg>
