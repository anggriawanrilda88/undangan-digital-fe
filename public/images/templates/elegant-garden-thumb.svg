<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533">
  <!-- Background warm cream -->
  <rect width="400" height="533" fill="#F5ECD7"/>

  <!-- Decorative circles top-left -->
  <circle cx="-20" cy="-20" r="100" fill="#B5936E" opacity="0.12"/>
  <!-- Decorative circles bottom-right -->
  <circle cx="430" cy="560" r="130" fill="#B5936E" opacity="0.12"/>

  <!-- Photo placeholder circle -->
  <circle cx="200" cy="160" r="70" fill="none" stroke="#B5936E" stroke-width="3"/>
  <circle cx="200" cy="160" r="63" fill="#F0DEC4"/>
  <!-- Heart icon inside -->
  <text x="200" y="171" text-anchor="middle" font-size="42" fill="#B5936E">💍</text>

  <!-- "The Wedding of" label -->
  <text x="200" y="268" text-anchor="middle" font-family="serif" font-size="11" fill="#B5936E" letter-spacing="4" opacity="0.9">THE WEDDING OF</text>

  <!-- Groom name -->
  <text x="200" y="310" text-anchor="middle" font-family="serif" font-size="34" font-weight="bold" fill="#B5936E">Rizky</text>

  <!-- Ampersand -->
  <text x="200" y="345" text-anchor="middle" font-family="serif" font-size="20" fill="#B5936E" opacity="0.5">&amp;</text>

  <!-- Bride name -->
  <text x="200" y="385" text-anchor="middle" font-family="serif" font-size="34" font-weight="bold" fill="#B5936E">Aulia</text>

  <!-- Date -->
  <text x="200" y="420" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9B7F60" opacity="0.8">20 September 2025</text>

  <!-- Divider line -->
  <line x1="140" y1="435" x2="260" y2="435" stroke="#B5936E" stroke-width="1" opacity="0.4"/>

  <!-- Template name tag -->
  <rect x="120" y="455" width="160" height="28" rx="14" fill="#B5936E" opacity="0.15"/>
  <text x="200" y="474" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#B5936E" font-weight="600">Elegant Garden</text>

  <!-- Tags -->
  <text x="200" y="510" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B5936E" opacity="0.6">Elegan · Floral · Romantis</text>
</svg>
